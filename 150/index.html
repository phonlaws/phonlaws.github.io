<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Half 1:50 Plan Calendar</title>

  <!-- Optional: nicer Thai font (works when online). If offline, it falls back to system fonts. -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="brand-title">แผนซ้อม Half 1:50</div>
      <div class="brand-sub">
        Race: <span id="raceDateLabel"></span> • 5 วัน/สัปดาห์ • Long: เสาร์
      </div>
    </div>

    <button id="openSettingsBtn" class="icon-btn" aria-label="Open settings">⚙️</button>
  </header>

  <!-- Settings Drawer (mobile-friendly) -->
  <section class="settings" id="settingsPanel" aria-hidden="true">
    <div class="settings-head">
      <div class="settings-title">ตั้งค่า</div>
      <button id="closeSettingsBtn" class="icon-btn" aria-label="Close settings">✕</button>
    </div>

    <div class="setting-row">
      <label>
        Race date:
        <input type="date" id="raceDateInput" />
      </label>

      <label>
        Start date (Monday week 1):
        <input type="date" id="startDateInput" />
      </label>

      <div class="setting-actions">
        <button id="rebuildBtn" class="btn btn-primary">สร้างแผนใหม่</button>
        <button id="exportBtn" class="btn">Export</button>
        <button id="importBtn" class="btn">Import</button>
        <input type="file" id="importFile" accept="application/json" hidden />
      </div>
    </div>

    <div class="legend">
      <span class="pill pill-rest">REST</span>
      <span class="pill pill-e">E</span>
      <span class="pill pill-t">T</span>
      <span class="pill pill-i">I</span>
      <span class="pill pill-r">R</span>
      <span class="pill pill-hm">HM</span>
      <span class="pill pill-long">LONG</span>
      <span class="pill pill-done">ซ้อมสำเร็จ</span>
      <span class="pill pill-skip">ข้ามซ้อม</span>
    </div>

    <div class="settings-note">
      * สถานะ/โน้ตเก็บในเครื่อง (localStorage) • ถ้าเปลี่ยนเครื่อง/ล้างเบราว์เซอร์ข้อมูลจะหาย
    </div>
  </section>

  <main class="calendar-wrap">
    <div class="month-bar">
      <div class="month-title" id="monthTitle"></div>
      <div class="month-sub" id="monthSub"></div>
    </div>

    <div class="dow">
      <div>จ.</div><div>อ.</div><div>พ.</div><div>พฤ.</div><div>ศ.</div><div>ส.</div><div>อา.</div>
    </div>

    <div class="calendar" id="calendar"></div>
  </main>

  <!-- Bottom navigation (mobile) -->
  <nav class="bottom-nav">
    <button id="prevBtn" class="nav-btn">◀</button>
    <button id="todayBtn" class="nav-btn nav-primary">วันนี้</button>
    <button id="nextBtn" class="nav-btn">▶</button>
  </nav>

  <!-- Modal (Bottom Sheet on mobile) -->
  <div class="modal-backdrop" id="modalBackdrop" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-head">
        <div>
          <div class="modal-date" id="modalDate"></div>
          <div class="modal-title" id="modalTitle"></div>
          <div class="modal-tags" id="modalTags"></div>
        </div>
        <button class="icon-btn" id="modalCloseBtn" aria-label="Close">✕</button>
      </div>

      <div class="modal-body">
        <div class="section">
          <div class="section-title">รายละเอียดโปรแกรม</div>
          <div class="details" id="modalDetails"></div>
        </div>

        <div class="section">
          <div class="section-title">เป้าหมาย (Pace/HR/RPE)</div>
          <div class="targets" id="modalTargets"></div>
        </div>

        <div class="section">
          <div class="section-title">โน้ตของคุณ</div>
          <textarea id="modalNotes" placeholder="จดความรู้สึก / HR / รองเท้า / อาการเจ็บ ฯลฯ"></textarea>
          <div class="note-hint">บันทึกอัตโนมัติลงเครื่อง</div>
        </div>
      </div>

      <div class="modal-foot">
        <button class="btn btn-done" id="doneBtn">✅ ซ้อมสำเร็จ</button>
        <button class="btn btn-skip" id="skipBtn">⏭️ ข้ามซ้อม</button>
        <button class="btn" id="resetBtn">รีเซ็ต</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
``
