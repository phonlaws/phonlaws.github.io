<!DOCTYPE html>
<html>
<head>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #f8f9fd;
      --card-bg: #ffffff;
      --primary-purple: #7c3aed;
      --text-main: #1f2937;
      --green-accent: #10b981;
      --red-accent: #ef4444;
    }
    
    body { 
      font-family: 'Inter', sans-serif; 
      background-color: var(--bg-color); 
      margin: 0; 
      color: var(--text-main);
    }

    .container { display: flex; min-height: 100vh; }
    
    /* Sidebar */
    .sidebar { width: 80px; background: white; border-right: 1px solid #e5e7eb; display: flex; flex-direction: column; align-items: center; padding: 20px 0; }
    .nav-item { margin-bottom: 25px; cursor: pointer; color: #9ca3af; font-size: 20px; }
    .nav-item.active { color: var(--primary-purple); }

    /* Main Content */
    .main-content { flex: 1; padding: 30px; overflow-y: auto; }
    
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
    
    /* Dashboard Stats */
    .stats-grid { 
      display: grid; 
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
      gap: 20px; 
      margin-bottom: 30px; 
    }
    .stat-card { background: white; padding: 20px; border-radius: 12px; border: 1px solid #e5e7eb; }
    .stat-label { color: #6b7280; font-size: 12px; text-transform: uppercase; margin-bottom: 8px; }
    .stat-value { font-size: 24px; font-weight: 600; }
    .stat-value.positive { color: var(--green-accent); }
    .stat-value.negative { color: var(--red-accent); }

    /* Main Layout Grid */
    .dashboard-layout { 
      display: grid; 
      grid-template-columns: 2fr 1fr; 
      gap: 20px; 
    }

    .card { background: white; padding: 25px; border-radius: 16px; border: 1px solid #e5e7eb; margin-bottom: 20px; }
    
    h2 { font-size: 18px; margin-top: 0; margin-bottom: 20px; }

    /* Table Style */
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; color: #6b7280; font-size: 13px; padding-bottom: 15px; }
    td { padding: 12px 0; border-top: 1px solid #f3f4f6; font-size: 14px; }

    /* Button */
    .btn-save { 
      background: var(--primary-purple); 
      color: white; 
      border: none; 
      padding: 10px 20px; 
      border-radius: 8px; 
      cursor: pointer; 
      font-weight: 500; 
    }
  </style>
</head>
<body>

<div class="container">
  <div class="sidebar">
    <div class="nav-item active">📊</div>
    <div class="nav-item">📓</div>
    <div class="nav-item">⚙️</div>
  </div>

  <div class="main-content">
    <div class="header">
      <h1>Dashboard</h1>
      <button class="btn-save" onclick="openModal()">+ Log New Trade</button>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Account Balance</div>
        <div class="stat-value">$18,427.59</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Total PNL</div>
        <div class="stat-value negative">-$3,285.40</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Win Rate</div>
        <div class="stat-value">28.21%</div>
      </div>
    </div>

    <div class="dashboard-layout">
      <div class="card">
        <h2>Recent Trades</h2>
        <table>
          <thead>
            <tr>
              <th>Instrument</th>
              <th>Direction</th>
              <th>PNL</th>
              <th>Outcome</th>
            </tr>
          </thead>
          <tbody id="trade-list">
            <tr>
              <td>EURUSD</td>
              <td style="color:red">↓ Sell</td>
              <td style="color:red">-$1,500.00</td>
              <td>Loss</td>
            </tr>
          </tbody>
        </table>
      </div>

      <div class="card">
        <h2>Discipline Score</h2>
        <div style="text-align:center; padding: 20px;">
          <div style="font-size: 48px; font-weight: bold; color: #f59e0b;">64</div>
          <div style="color: #6b7280; font-size: 14px;">Developing Trader</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  // ฟังก์ชันตัวอย่างสำหรับการส่งข้อมูลกลับไปยัง GS
  function logTrade() {
    const tradeData = {
      instrument: 'EURUSD',
      direction: 'Buy',
      pnl: 1329,
      // ... เก็บข้อมูลอื่นๆ จาก input
    };
    
    google.script.run.withSuccessHandler(res => {
      alert("บันทึกสำเร็จ!");
    }).saveTrade(tradeData);
  }
</script>

</body>
</html>
