<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ตารางซ้อมวิ่ง</title>
    <!-- เรียกใช้ Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- เรียกใช้ Font Prompt -->
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #f3f4f6; }
        .hide-scroll::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="text-gray-800 antialiased min-h-screen pb-10">

    <!-- Header -->
    <div class="bg-white shadow-sm p-4 sticky top-0 z-10 flex justify-between items-center">
        <h1 class="text-xl font-bold text-slate-800">🏃‍♂️ ตารางซ้อมวิ่ง</h1>
        <div class="flex space-x-2 items-center">
            <button onclick="changeMonth(-1)" class="p-2 bg-gray-100 rounded-lg hover:bg-gray-200">◀</button>
            <span id="monthYearDisplay" class="font-medium min-w-[120px] text-center">พฤษภาคม 2026</span>
            <button onclick="changeMonth(1)" class="p-2 bg-gray-100 rounded-lg hover:bg-gray-200">▶</button>
        </div>
    </div>

    <!-- ส่วนแสดงสถานะกำลังโหลด -->
    <div id="loading" class="text-center py-10">
        <div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-gray-300 border-t-slate-800 mb-2"></div>
        <p class="text-gray-500">กำลังโหลดข้อมูล...</p>
    </div>

    <!-- ปฏิทิน -->
    <div class="max-w-4xl mx-auto mt-6 px-4 hidden" id="calendarContainer">
        <!-- วันในสัปดาห์ -->
        <div class="grid grid-cols-7 gap-2 text-center font-semibold text-gray-500 text-sm mb-2">
            <div>อา.</div><div>จ.</div><div>อ.</div><div>พ.</div><div>พฤ.</div><div>ศ.</div><div>ส.</div>
        </div>
        <!-- ช่องวันที่ -->
        <div id="calendarGrid" class="grid grid-cols-7 gap-2"></div>
    </div>

    <!-- ========================================== -->
    <!-- Modal (หน้าต่าง Popup) -->
    <!-- ========================================== -->
    <div id="programModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden opacity-0 transition-opacity duration-300">
        <div class="bg-white rounded-2xl w-11/12 max-w-md p-6 relative transform scale-95 transition-transform duration-300 shadow-xl" id="modalContent">
            
            <!-- ปุ่มปิด -->
            <button onclick="closeModal()" class="absolute top-4 right-4 text-gray-400 hover:text-gray-700 w-8 h-8 bg-gray-100 rounded-full flex items-center justify-center">
                ✕
            </button>

            <!-- หัวข้อวันที่ -->
            <h2 id="modalDateTitle" class="text-xl font-bold text-slate-800 mb-4 pr-8">5 พฤษภาคม 2026</h2>

            <!-- กล่องข้อมูลโปรแกรม -->
            <div class="bg-slate-50 border border-slate-100 p-4 rounded-xl mb-5 space-y-3 text-sm text-slate-700">
                <div class="flex items-start">
                    <span class="mr-2">🏃</span>
                    <div><strong>โปรแกรม:</strong> <span id="modalProgram">-</span></div>
                </div>
                <div class="flex items-start">
                    <span class="mr-2">⏱️</span>
                    <div><strong>เป้าหมาย:</strong> <span id="modalPace">-</span></div>
                </div>
                <div class="flex items-start text-blue-700 bg-blue-50 p-2 rounded-lg -mx-2 -mb-2 mt-1">
                    <span class="mr-2">💡</span>
                    <div><strong>คำแนะนำ:</strong> <span id="modalDetail">-</span></div>
                </div>
            </div>

            <!-- ส่วนบันทึกผลการซ้อม -->
            <div class="mb-5">
                <label class="block text-sm font-medium text-gray-700 mb-2">ผลการซ้อม</label>
                <div class="grid grid-cols-2 gap-3">
                    <button id="btnSuccess" onclick="setResult('success')" class="py-2.5 rounded-lg border-2 border-emerald-500 text-emerald-600 font-semibold bg-white transition-colors">
                        สำเร็จ
                    </button>
                    <button id="btnFail" onclick="setResult('fail')" class="py-2.5 rounded-lg border-2 border-rose-500 text-rose-600 font-semibold bg-white transition-colors">
                        ไม่สำเร็จ
                    </button>
                </div>
            </div>

            <!-- ส่วน Note -->
            <div class="mb-5">
                <label class="block text-sm font-medium text-gray-700 mb-2">บันทึก (Note)</label>
                <textarea id="modalUserNote" rows="3" class="w-full border border-gray-300 rounded-xl p-3 text-sm focus:outline-none focus:ring-2 focus:ring-slate-800 focus:border-transparent resize-none" placeholder="จดบันทึกที่นี่..."></textarea>
            </div>

            <!-- ปุ่มบันทึก -->
            <button onclick="saveData()" class="w-full bg-slate-800 hover:bg-slate-900 text-white font-semibold rounded-xl py-3.5 transition-colors shadow-md">
                บันทึกข้อมูล
            </button>
        </div>
    </div>

    <!-- ========================================== -->
    <!-- Javascript -->
    <!-- ========================================== -->
    <script>
                // 🔴🔴🔴 เอา URL ของ Web App มาวางที่นี่ 🔴🔴🔴
        const SCRIPT_URL = 'YOUR_WEB_APP_URL_HERE'; 

        let programsData = [];
        let logsData = {}; // สำหรับเก็บประวัติการบันทึก
        let currentDate = new Date(2026, 4, 1); 
        let selectedResult = '';
        let currentProgram = null; // เก็บข้อมูลวันที่กำลังเปิดดู

        const monthNames = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];

        window.onload = () => {
            fetchData();
        };

        // 🟢 1. ดึงข้อมูลจาก Google Sheets (แก้ให้ตรงกับ Apps Script ของคุณ)
        async function fetchData() {
            if(SCRIPT_URL === 'YOUR_WEB_APP_URL_HERE') {
                alert('โปรดใส่ URL ของ Apps Script ในโค้ดก่อนครับ');
                document.getElementById('loading').style.display = 'none';
                return;
            }

            try {
                // เพิ่ม ?action=get_all ส่งไปให้ Apps Script
                const response = await fetch(SCRIPT_URL + '?action=get_all');
                const result = await response.json();
                
                // เช็คว่ามีข้อมูล programs ส่งกลับมาไหม
                if (result.programs) {
                    programsData = result.programs;
                    logsData = result.logs; // เก็บข้อมูล Log ไว้เช็คสถานะสำเร็จ/ไม่สำเร็จ
                    renderCalendar();
                } else {
                    showError();
                }
            } catch (error) {
                showError();
            }
        }

        function showError() {
            document.getElementById('loading').innerHTML = '<p class="text-rose-500">มีบางอย่างขัดข้อง แต่คุณสามารถรีเฟรชเพื่อลองใหม่ได้ครับ</p>';
            document.getElementById('loading').style.display = 'block';
            document.getElementById('calendarContainer').classList.add('hidden');
        }

        function changeMonth(step) {
            currentDate.setMonth(currentDate.getMonth() + step);
            renderCalendar();
        }

        function renderCalendar() {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('calendarContainer').classList.remove('hidden');
            
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            
            document.getElementById('monthYearDisplay').innerText = `${monthNames[month]} ${year}`;
            
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            
            const grid = document.getElementById('calendarGrid');
            grid.innerHTML = '';

            for (let i = 0; i < firstDay; i++) {
                grid.innerHTML += `<div class="p-2"></div>`;
            }

            for (let day = 1; day <= daysInMonth; day++) {
                const programToday = programsData.find(p => p.y === year && p.m === (month + 1) && p.d === day);
                const dateKey = `${year}-${month + 1}-${day}`; // สร้าง Key เพื่อเช็คประวัติใน Log
                const logToday = logsData[dateKey]; // ตรวจสอบว่าวันนี้มีการบันทึกผลหรือยัง
                
                let dayHTML = '';
                if (programToday && programToday.program && programToday.program.trim() !== '') {
                    
                    // เช็คสัญลักษณ์ว่าบันทึกผลแล้วหรือยัง
                    let statusIcon = '';
                    if (logToday) {
                        statusIcon = logToday.status === 'success' ? '✅' : '❌';
                    } else {
                        statusIcon = programToday.program.includes('พัก') ? '🧘' : '🏃';
                    }

                    dayHTML = `
                        <div onclick='openModal(${JSON.stringify(programToday)})' class="bg-white border border-gray-200 rounded-xl p-2 h-24 flex flex-col cursor-pointer hover:border-slate-800 hover:shadow-md transition-all">
                            <span class="font-bold text-slate-800 mb-1">${day}</span>
                            <div class="text-xs text-gray-600 leading-tight overflow-hidden text-ellipsis line-clamp-2">${programToday.program}</div>
                            <div class="mt-auto flex justify-between items-center text-xs">
                                ${statusIcon}
                            </div>
                        </div>
                    `;
                } else {
                    dayHTML = `
                        <div class="bg-gray-50 border border-gray-100 rounded-xl p-2 h-24 flex flex-col text-gray-400">
                            <span class="font-medium">${day}</span>
                        </div>
                    `;
                }
                grid.innerHTML += dayHTML;
            }
        }

        function openModal(data) {
            currentProgram = data; // จำไว้ว่ากำลังเปิดของวันไหน
            const modal = document.getElementById('programModal');
            const modalContent = document.getElementById('modalContent');
            
            document.getElementById('modalDateTitle').innerText = `${data.d} ${monthNames[data.m - 1]} ${data.y}`;
            document.getElementById('modalProgram').innerText = data.program || '-';
            document.getElementById('modalPace').innerText = data.pace || '-';
            document.getElementById('modalDetail').innerText = data.detail || '-'; 
            
            // ตรวจสอบว่าเคยบันทึกไว้ไหม ถ้าเคยให้ดึงมาแสดง
            const dateKey = `${data.y}-${data.m}-${data.d}`;
            const existingLog = logsData[dateKey];
            
            if (existingLog) {
                setResult(existingLog.status);
                document.getElementById('modalUserNote').value = existingLog.note || '';
            } else {
                setResult('');
                document.getElementById('modalUserNote').value = '';
            }

            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modalContent.classList.remove('scale-95');
                modalContent.classList.add('scale-100');
            }, 10);
        }

        function closeModal() {
            const modal = document.getElementById('programModal');
            const modalContent = document.getElementById('modalContent');
            
            modal.classList.add('opacity-0');
            modalContent.classList.remove('scale-100');
            modalContent.classList.add('scale-95');
            
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300);
        }

        function setResult(status) {
            selectedResult = status;
            const btnSuccess = document.getElementById('btnSuccess');
            const btnFail = document.getElementById('btnFail');

            btnSuccess.className = "py-2.5 rounded-lg border-2 border-emerald-500 text-emerald-600 font-semibold bg-white transition-colors";
            btnFail.className = "py-2.5 rounded-lg border-2 border-rose-500 text-rose-600 font-semibold bg-white transition-colors";

            if (status === 'success') {
                btnSuccess.className = "py-2.5 rounded-lg border-2 border-emerald-500 text-white font-semibold bg-emerald-500 shadow-md transition-colors";
            } else if (status === 'fail') {
                btnFail.className = "py-2.5 rounded-lg border-2 border-rose-500 text-white font-semibold bg-rose-500 shadow-md transition-colors";
            }
        }

        // 🟢 2. ส่งข้อมูลกลับไปบันทึก (เชื่อมกับ action='save')
        async function saveData() {
            if (!selectedResult) {
                alert('โปรดเลือกผลการซ้อม (สำเร็จ / ไม่สำเร็จ)');
                return;
            }
            
            const note = document.getElementById('modalUserNote').value;
            const key = `${currentProgram.y}-${currentProgram.m}-${currentProgram.d}`; // แปลงเป็น YYYY-M-D
            
            // ปิด Modal และแสดงสถานะกำลังโหลด
            closeModal();
            document.getElementById('calendarContainer').classList.add('hidden');
            document.getElementById('loading').style.display = 'block';
            document.getElementById('loading').innerHTML = '<div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-gray-300 border-t-slate-800 mb-2"></div><p class="text-gray-500">กำลังบันทึกข้อมูล...</p>';

            try {
                // สร้างชุดข้อมูลแบบ POST
                const params = new URLSearchParams();
                params.append('action', 'save');
                params.append('key', key);
                params.append('status', selectedResult);
                params.append('note', note);

                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: params
                });
                
                const result = await response.json();
                
                if(result.result === 'success') {
                    // ถ้าสำเร็จ ให้ดึงข้อมูลใหม่ทั้งหมดเพื่ออัปเดตหน้าจอ
                    document.getElementById('loading').innerHTML = '<div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-gray-300 border-t-slate-800 mb-2"></div><p class="text-gray-500">กำลังโหลดข้อมูล...</p>';
                    fetchData();
                } else {
                    alert('บันทึกไม่สำเร็จ มีข้อผิดพลาดบางอย่าง');
                    fetchData(); // โหลดหน้าใหม่
                }
            } catch (err) {
                alert('การเชื่อมต่อมีปัญหา กรุณาลองใหม่อีกครั้ง');
                fetchData(); // โหลดหน้าใหม่
            }
        }
    </script>
</body>
</html>
